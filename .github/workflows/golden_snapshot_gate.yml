name: Golden Snapshot Gate

on:
  pull_request:
  push:
    branches:
      - Main

concurrency:
  group: golden-snapshot-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  golden-snapshots:
    name: Golden snapshots
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir git+https://github.com/jenojp/negspacy
          pip install --no-cache-dir "https://github.com/explosion/spacy-models/releases/download/en_core_web_sm-3.7.1/en_core_web_sm-3.7.1-py3-none-any.whl"
          python -c "import spacy; spacy.load('en_core_web_sm'); print('spaCy model OK')"

      - name: Run golden snapshot gate
        run: python -m pytest tests/test_golden_end_to_end_snapshots.py -q

      - name: Snapshot drift guidance
        if: failure()
        run: |
          echo "::error title=Golden snapshot drift detected::Review the output diff. If the new output is intentional, regenerate locally with REGENERATE_GOLDENS=1 and rerun python -m pytest tests/test_golden_end_to_end_snapshots.py -q before committing the updated files in tests/golden_snapshots."
