name: Run Unlxck

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      GOOGLE_CREDS_B64: ${{ secrets.GOOGLE_CREDS_B64 }}
      SUPABASE_URL: ${{ vars.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      INJURY_DEBUG: "1"
      INJURY_TRACE: "1"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install wkhtmltopdf (for PDFKit)
        run: |
          sudo apt-get update
          sudo apt-get install -y wkhtmltopdf

      - name: Install Python dependencies + spaCy model
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt
          pip install --no-cache-dir git+https://github.com/jenojp/negspacy
          # Install spaCy model deterministically (must match spaCy 3.7.x)
          pip install --no-cache-dir "https://github.com/explosion/spacy-models/releases/download/en_core_web_lg-3.7.1/en_core_web_lg-3.7.1-py3-none-any.whl"
          # Smoke test: confirm the model loads
          python -c "import spacy; spacy.load('en_core_web_lg'); print('spaCy model OK')"
          pip check

      - name: Preflight Supabase URL
        run: |
          python - <<'PY'
          import os

          raw = os.environ["SUPABASE_URL"]
          cleaned = raw.strip()
          print(f"SUPABASE_URL_RAW={raw}")
          if cleaned.lower().startswith("supabase_url="):
              print(f"SUPABASE_URL_CLEANED={cleaned}")
              raise SystemExit("GitHub var still contains prefix")
          cleaned = cleaned.rstrip("/")
          print(f"SUPABASE_URL_CLEANED={cleaned}")
          if not cleaned.startswith("https://"):
              raise SystemExit("SUPABASE_URL must start with https://")
          PY

      - name: Validate test data JSON
        run: python -m json.tool test_data.json

      - name: Run tests
        run: python -m pytest -x -vv

      - name: Run fightcamp
        run: python -m fightcamp.main